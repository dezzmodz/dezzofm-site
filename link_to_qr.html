<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Generator - DezzXOFM</title>

<link rel="stylesheet" href="qris.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>
        
        <div class="snow-container"></div>


<div id="welcomeOverlay">
  <div class="welcome-box">


<h2 class="step-title">Welcome to 𝘿𝙚𝙯𝙕✘𝙊𝙁𝙈 </h2>

<p class="description">
    Complete all verification steps to unlock exclusive premium content.</p>

<div class="step-list">

    <div class="step" id="welcomeStep1">▶️ Subscribe YouTube</div>

<div class="step" id="welcomeStep2">📷 Follow Instagram</div>

<div class="step" id="welcomeStep3">🎵 Follow TikTok</div>

</div>

<div class="progress-box">

    <div class="progress-title">
        🚀 Progress Unlock
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="welcomeProgressFill"></div>
    </div>

    <div class="progress-text" id="welcomeProgressText">
        0/3 Step Complete
    </div>

</div>

<div id="welcomeUnlockMenu"
     class="unlock-grid"
     style="display:none;">

    <button id="startBtn"
            onclick="startWebsite()">
        🚀 Start Website
    </button>

</div>

  </div>
</div>

<div class="container">

<h2>⚡ QR Generator</h2>

<input 
id="url"
type="text"
placeholder="Masukkan tautan https://">

<label>🎨 Warna QR</label>
<input type="color" id="darkColor" value="#000000">

<label>🖼 Warna Background</label>
<input type="color" id="lightColor" value="#ffffff">

<select id="size">

<option value="128">128 x 128</option>
<option value="200" selected>200 x 200</option>
<option value="300">300 x 300</option>
<option value="500">500 x 500</option>

</select>


<div id="qr"></div>


<div class="buttons">

<button onclick="generateQR()">
🚀 Buat QR
</button>

<button onclick="downloadQR()">
⬇️ Download
</button>

<button onclick="clearQR()">
🗑 Hapus
</button>

</div>


</div>


<script src="qris.js"></script>

</body>
</html>
