<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Register</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-box">

<img src="https://files.catbox.moe/7n2m2x.jpg" class="logo">

<h1>Buat Akun</h1>

<p>Daftar akun baru</p>

<input
id="displayName"
placeholder="👤 Nama Lengkap">

<input
id="username"
placeholder="@username">

<input
type="email"
id="email"
placeholder="📧 Email">

<input
type="password"
id="password"
placeholder="🔒 Password">

<input
type="password"
id="password2"
placeholder="🔒 Ulangi Password">

<button id="registerBtn">
DAFTAR
</button>

<hr>

<button onclick="location.href='login.html'">
Sudah punya akun?
</button>

</div>

<script type="module" src="register.js"></script>

</body>

</html>
