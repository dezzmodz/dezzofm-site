<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LIVE CHAT</title>
<link rel="stylesheet" href="chat.css">
</head>

<body>

<div class="chat-box">

<div class="telegram-chat">

  <div class="topbar">

    <button onclick="goHome()">←</button>

    <div>
      <h3>💬 Live Chat</h3>
      <small>Online</small>
    </div>

  </div>

  <div id="pinnedMessage">
    <div class="pin-title">📌 Pesan Disematkan</div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input-area">

    <input id="username" placeholder="👤 Nama">

    <textarea id="message" placeholder="✍️ Tulis pesan..."></textarea>

    <button onclick="sendMessage()">➤</button>

  </div>

</div>

</div>

<script>
function goHome(){
  window.location.href="index.html";
}
</script>

<script type="module" src="chat.js"></script>

</body>
</html>
