<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Downloader</title>
<link rel="stylesheet" href="Thumbnail.css">
</head>
<body>

<div class="snow-container"></div>

<div class="thumbnail-container">

  <div class="thumbnail-header">
    <img src="https://i.ibb.co.com/Rk83TQnJ/sitagrup-pp.jpg">
    <h1>🎬 Thumbnail Downloader</h1>
    <p>Download Thumbnail YouTube & Shorts HD</p>
  </div>

  <input
    type="text"
    id="ytUrl"
    placeholder="Paste link YouTube..."
  >

  <button class="thumb-btn" onclick="getThumbnail()">
    🚀 Ambil Thumbnail
  </button>

  <img id="thumbnail">

  <a id="downloadThumb" target="_blank">
    ⬇️ Download Thumbnail
  </a>

  <button class="btn-back" onclick="location.href='index.html'">
        ↩️ Back
    </button>

</div>

<script src="thumbnail.js"></script>

</body>
</html>
